{% extends 'base.html' %} {% block content %}

<div class="container">
  <h1 class="text-center">Bookings</h1>

  {% for order in orders%}
  <div class="card card-custom col-12 my-2">
    <div class="card-body">
      <h5 class="card-title">{{order.event_id}}</h5>
    </div>
    <div class="card-footer">
      <p>Quantity: {{order.quantity}}</p>
      <p>Price: {{order.price}}</p>
      <p>Total: {{order.total_price}}</p>
      <p>Booked: {{order.date_time}}</p>
      <p>Booking ID: {{order.id}}</p>
    </div>
  </div>
  {% endfor %}
</div>

{% endblock %}
